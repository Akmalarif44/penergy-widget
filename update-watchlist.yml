name: Update Watchlist Prices

on:
  schedule:
    - cron: '*/15 1-9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch all symbols
        run: |
          mkdir -p data
          declare -a symbols=("5133.KL" "5141.KL" "5243.KL" "7250.KL" "5142.KL" "0034.KL" "XOM" "SHEL" "CVX")
          echo "[" > watchlist.json
          first=true
          for sym in "${symbols[@]}"; do
            if [ "$first" = false ]; then echo "," >> watchlist.json; fi
            curl -s "https://query1.finance.yahoo.com/v8/finance/chart/${sym}" -H "User-Agent: Mozilla/5.0" >> watchlist.json
            first=false
          done
          echo "]" >> watchlist.json

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add watchlist.json
          git diff --staged --quiet || git commit -m "Update watchlist data"
          git push

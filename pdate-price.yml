name: Update PENERGY Price

on:
  schedule:
    - cron: '*/15 1-9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-price:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch price and save JSON
        run: |
          curl -s "https://query1.finance.yahoo.com/v8/finance/chart/5133.KL?range=3mo&interval=1d" \
            -H "User-Agent: Mozilla/5.0" \
            -o data.json

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update PENERGY price data"
          git push

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIT News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #1B1F23;
    --steel: #5A6B78;
    --line: #E2DAC8;
    --cream: #F4F0E6;
    --c-hsse: #B41F2E;
    --c-it: #1F5FA8;
    --c-hr: #7A3FA0;
    --c-social: #D98E2B;
    --c-corp: #1E7A4C;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:transparent;}
  body{font-family:'IBM Plex Sans', system-ui, sans-serif; color:var(--ink); -webkit-font-smoothing:antialiased;}
  a{color:inherit; text-decoration:none;}

  .wrap{max-width:640px; margin:0 auto;}

  .carousel{position:relative;}
  .track-wrap{overflow:hidden; border-radius:8px;}
  .track{display:flex; transition:transform .4s ease;}
  .slide{flex:0 0 100%; box-sizing:border-box;}

  .card{
    background:#fff; border:1px solid var(--line); border-radius:8px; overflow:hidden;
    display:flex; flex-direction:column;
  }
  .card img{width:100%; height:200px; object-fit:cover; display:block; background:var(--cream);}
  .card-body{padding:14px 16px 16px;}
  .card-badge{display:flex; align-items:center; gap:6px; margin-bottom:8px;}
  .dept-dot{width:7px; height:7px; border-radius:50%; flex-shrink:0;}
  .dept-label{
    font-family:'IBM Plex Mono'; font-size:10px; font-weight:700; letter-spacing:0.05em;
    text-transform:uppercase; color:var(--steel);
  }
  .card-title{font-size:15px; font-weight:700; line-height:1.4; margin:0 0 8px; color:var(--ink);}
  .card-time{font-size:11.5px; color:var(--steel);}

  .car-nav{display:flex; align-items:center; justify-content:center; gap:14px; margin-top:12px;}
  .car-btn{
    width:28px; height:28px; border-radius:50%; border:1px solid var(--line); background:#fff;
    display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--ink); flex-shrink:0;
    transition:border-color .15s, color .15s;
  }
  .car-btn:hover{border-color:var(--c-it); color:var(--c-it);}
  .car-btn svg{width:13px; height:13px;}
  .car-dots{display:flex; gap:6px;}
  .car-dots button{
    width:6px; height:6px; padding:0; border:0; border-radius:50%; background:var(--line);
    cursor:pointer; transition:background .2s, width .2s;
  }
  .car-dots button.active{background:var(--c-it); width:16px; border-radius:3px;}
</style>
</head>
<body>

<div class="wrap">
  <div class="carousel" id="carousel">
    <div class="track-wrap">
      <div class="track" id="track"></div>
    </div>
    <div class="car-nav">
      <div class="car-btn" id="prevBtn" aria-label="Previous">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M15 18l-6-6 6-6"/></svg>
      </div>
      <div class="car-dots" id="carDots"></div>
      <div class="car-btn" id="nextBtn" aria-label="Next">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M9 6l6 6-6 6"/></svg>
      </div>
    </div>
  </div>
</div>

<script>
/* ===========================================================
   LIVE FEED: same source as tech-news.html — The Register's
   Networks / Systems / Storage feeds, merged and de-duped.
   Falls back to a small curated pool if the live feed can't
   be reached (e.g. blocked by a corporate network/CSP).
=========================================================== */
const DEPTS = {
  it:    { label: "Group IT",           color: "var(--c-it)" },
  hsse:  { label: "HSSE Workspace",     color: "var(--c-hsse)" },
  hr:    { label: "HR",                 color: "var(--c-hr)" },
  social:{ label: "Social & Community", color: "var(--c-social)" },
  corp:  { label: "Corporate Comms",    color: "var(--c-corp)" }
};

const CARDS_TO_SHOW = 8;
const REGISTER_TAGS = ['networks', 'systems', 'storage'];

const FALLBACK_POOL = [
  { title:"USB drives found on-site? Hand them to IT, don't plug in", photo:"USB Stick.jpg" },
  { title:"Outlook tips: schedule send and Focused Inbox explained", photo:"Laptop computer.jpg" },
  { title:"Data backup basics: the 3-2-1 rule explained", photo:"Datacenter.jpg" },
  { title:"Strong passwords & MFA: 60 seconds that stop most attacks", photo:"Closed lock on laptop (49918711713).jpg" }
];

function commonsUrl(filename){
  if(/^https?:\/\//i.test(filename)) return filename;
  return `https://commons.wikimedia.org/wiki/Special:FilePath/${encodeURIComponent(filename.replace(/ /g,'_'))}?width=600`;
}

function feedUrl(tag){
  return `https://api.theregister.com/api/v1/article?query=tag:${encodeURIComponent(tag)}&orderBy=published&site_id=2&remapper=rss&limit=8&_cb=${Date.now()}`;
}
function proxyUrl(tag){
  return 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(feedUrl(tag));
}

function extractImage(item){
  const html = item.content || item.description || '';
  const matches = html.match(/<img[^>]+src=["']([^"']+)["']/gi) || [];
  const skip = /(icon|logo|avatar|pixel|1x1|spacer|tracking)/i;
  for(const m of matches){
    const src = (m.match(/src=["']([^"']+)["']/i) || [])[1];
    if(src && !skip.test(src)) return src;
  }
  if(matches.length){
    const first = (matches[0].match(/src=["']([^"']+)["']/i) || [])[1];
    if(first) return first;
  }
  return '';
}
function imageFor(item){
  return extractImage(item) || item.thumbnail || (item.enclosure && item.enclosure.link) || '';
}

function timeAgo(dateStr){
  const mins = Math.max(0, Math.floor((Date.now() - new Date(dateStr).getTime()) / 60000));
  if(mins < 60) return mins <= 1 ? 'Just now' : mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if(hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

let slideIndex = 0;
let autoplayTimer = null;

function renderCards(items){
  const track = document.getElementById('track');
  const dotsWrap = document.getElementById('carDots');

  track.innerHTML = items.map(item => `
    <div class="slide">
      <a class="card" href="${item.link || '#'}" target="_blank" rel="noopener">
        ${item.photo ? `<img src="${item.photo}" alt="" onerror="this.style.display='none'">` : ''}
        <div class="card-body">
          <div class="card-badge">
            <span class="dept-dot" style="background:${DEPTS.it.color}"></span>
            <span class="dept-label">${DEPTS.it.label}</span>
          </div>
          <p class="card-title">${item.title}</p>
          <div class="card-time">${item.timeLabel}</div>
        </div>
      </a>
    </div>
  `).join('');

  dotsWrap.innerHTML = items.map((_, i) => `<button aria-label="Go to slide ${i + 1}"></button>`).join('');
  dotsWrap.querySelectorAll('button').forEach((btn, i) => {
    btn.addEventListener('click', () => { goToSlide(i); resetAutoplay(); });
  });

  slideIndex = 0;
  goToSlide(0);
  resetAutoplay();
}

function goToSlide(i){
  const track = document.getElementById('track');
  const slides = track.querySelectorAll('.slide');
  if(!slides.length) return;
  slideIndex = (i + slides.length) % slides.length;
  track.style.transform = `translateX(-${slideIndex * 100}%)`;
  document.getElementById('carDots').querySelectorAll('button').forEach((d, di) => {
    d.classList.toggle('active', di === slideIndex);
  });
}

function resetAutoplay(){
  clearInterval(autoplayTimer);
  autoplayTimer = setInterval(() => goToSlide(slideIndex + 1), 6000);
}

document.getElementById('prevBtn').addEventListener('click', () => { goToSlide(slideIndex - 1); resetAutoplay(); });
document.getElementById('nextBtn').addEventListener('click', () => { goToSlide(slideIndex + 1); resetAutoplay(); });

const carouselEl = document.getElementById('carousel');
carouselEl.addEventListener('mouseenter', () => clearInterval(autoplayTimer));
carouselEl.addEventListener('mouseleave', () => resetAutoplay());

function renderFallback(){
  const base = Date.now();
  const items = FALLBACK_POOL.slice(0, CARDS_TO_SHOW).map((item, i) => ({
    title: item.title,
    photo: commonsUrl(item.photo),
    link: '#',
    timeLabel: timeAgo(base - i * 3 * 60 * 60 * 1000)
  }));
  renderCards(items);
}

function loadLiveFeed(){
  Promise.all(
    REGISTER_TAGS.map(tag =>
      fetch(proxyUrl(tag), { cache: 'no-store' })
        .then(res => res.ok ? res.json() : null)
        .catch(() => null)
    )
  ).then(responses => {
    let items = [];
    responses.forEach(data => {
      if(data && data.status === 'ok' && Array.isArray(data.items)){
        items = items.concat(data.items);
      }
    });
    if(!items.length) throw new Error('empty');

    const seen = new Set();
    items = items.filter(item => {
      if(seen.has(item.link)) return false;
      seen.add(item.link);
      return true;
    });
    items.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
    items = items.slice(0, CARDS_TO_SHOW);

    const mapped = items.map(item => ({
      title: item.title,
      photo: imageFor(item),
      link: item.link,
      timeLabel: timeAgo(item.pubDate)
    }));
    renderCards(mapped);
  }).catch(() => {
    renderFallback();
  });
}

loadLiveFeed();
setInterval(loadLiveFeed, 20 * 60 * 1000); // re-check for new articles every 20 minutes
</script>

</body>
</html>

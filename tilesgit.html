<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Services</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --petra-red: #B41F2E;
    --ink: #1B1F23;
    --steel: #5A6B78;
    --line: #E2DAC8;
    --cream: #F4F0E6;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:transparent;}
  body{font-family:'IBM Plex Sans', system-ui, sans-serif; color:var(--ink); -webkit-font-smoothing:antialiased;}
  a{color:inherit; text-decoration:none;}
 
  .wrap{max-width:1000px; margin:0 auto;}
  .section-head{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
  .section-head h2{font-family:'IBM Plex Mono'; font-size:13px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; margin:0; color:var(--ink);}
  .section-line{flex:1; height:1px; background:var(--line);}
 
  .grid{display:grid; grid-template-columns:repeat(2, 1fr); gap:16px; max-width:720px;}
  @media (max-width:480px){ .grid{grid-template-columns:1fr;} }
 
  .tile{
    position:relative; display:block; overflow:hidden; border-radius:10px;
    aspect-ratio:1 / 1; background:var(--ink);
    box-shadow:0 2px 8px rgba(12,27,38,0.10);
    transition:transform .15s, box-shadow .15s;
  }
  .tile:hover{ transform:translateY(-3px); box-shadow:0 8px 20px rgba(12,27,38,0.18); }
  .tile video{
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
    opacity:0.75; transition:opacity .2s, transform 6s ease;
    transform:scale(1.02);
  }
  .tile:hover video{ opacity:0.9; transform:scale(1.08); }
  .tile-scrim{
    position:absolute; inset:0;
    background:linear-gradient(0deg, rgba(6,14,20,0.90) 0%, rgba(6,14,20,0.35) 55%, rgba(6,14,20,0.10) 100%);
  }
  .tile-body{position:absolute; inset:0; z-index:1; display:flex; flex-direction:column; justify-content:flex-end; padding:16px;}
  .tile-icon{
    width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,0.16);
    border:1px solid rgba(255,255,255,0.3);
    display:flex; align-items:center; justify-content:center; color:#fff; margin-bottom:10px;
  }
  .tile-icon svg{width:18px; height:18px;}
  .tile-label{font-size:15.5px; font-weight:700; color:#fff; line-height:1.3;}
  .tile-sub{font-size:11px; color:rgba(255,255,255,0.75); margin-top:3px;}
 
  @media (prefers-reduced-motion: reduce){
    .tile video{ display:none; }
    .tile{ background:linear-gradient(150deg, #841720, #B41F2E); }
  }
</style>
</head>
<body>
 
<div class="wrap">
  <div class="section-head"><h2>IT Services</h2><div class="section-line"></div></div>
  <div class="grid" id="tileGrid"></div>
</div>
 
<script>
/* ===========================================================
   EDITABLE — add/remove/reorder tiles freely.
   video: direct mp4 URL. All defaults below are from Mixkit.co
   under their Free License (commercial use OK, no attribution
   required) — verified via each category page's license notice.
   icon: any key from ICONS below.
=========================================================== */
const TILES = [
  {
    label: "SAP Services",
    icon: "sap",
    href: "https://penergy.sharepoint.com/sites/IT/SitePages/SAP-Services.aspx?source=https%3a//penergy.sharepoint.com/sites/IT/SitePages/Forms/ByAuthor.aspx?startedResponseCatch%3Dtrue",
    video: "https://assets.mixkit.co/videos/23162/23162-360.mp4"
  },
  {
    label: "Desktop Services",
    icon: "desktop",
    href: "https://penergy.sharepoint.com/sites/IT/SitePages/Desktop-Services.aspx?source=https%3a//penergy.sharepoint.com/sites/IT/SitePages/Forms/ByAuthor.aspx",
    video: "https://assets.mixkit.co/videos/9757/9757-360.mp4"
  },
  {
    label: "Email Services",
    icon: "mail",
    href: "https://penergy.sharepoint.com/sites/IT/SitePages/Email-Services.aspx?source=https%3a//penergy.sharepoint.com/sites/IT/SitePages/Forms/ByAuthor.aspx",
    video: "https://assets.mixkit.co/videos/242/242-360.mp4"
  },
  {
    label: "IT Service Desk",
    icon: "ticket",
    href: "https://penergy.sharepoint.com/sites/IT/SitePages/IT-Service-DESK.aspx",
    video: "https://assets.mixkit.co/videos/22987/22987-360.mp4"
  }
];
 
const ICONS = {
  sap: `<path d="M4 17V7l6 10V7"/><path d="M13 7h4a3 3 0 010 6h-2v4"/>`,
  desktop: `<rect x="3" y="4" width="18" height="12" rx="1.5"/><path d="M8 20h8M12 16v4"/>`,
  mail: `<rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/>`,
  ticket: `<path d="M3 9a2 2 0 002-2V6a1 1 0 011-1h12a1 1 0 011 1v1a2 2 0 002 2v6a2 2 0 00-2 2v1a1 1 0 01-1 1H6a1 1 0 01-1-1v-1a2 2 0 00-2-2z"/>`,
  grid: `<rect x="3" y="3" width="18" height="18" rx="1"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/>`,
  cloud: `<path d="M7 18a4 4 0 010-8 5 5 0 019.6-1.5A4 4 0 0118 18H7z"/>`,
  shield: `<path d="M12 2l8 3v6c0 5-3.5 8.5-8 11-4.5-2.5-8-6-8-11V5z"/>`
};
 
function iconSvg(key){
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${ICONS[key] || ICONS.grid}</svg>`;
}
 
function render(){
  document.getElementById('tileGrid').innerHTML = TILES.map(t => `
    <a class="tile" href="${t.href}">
      <video autoplay muted loop playsinline preload="metadata" onerror="this.style.display='none'">
        <source src="${t.video}" type="video/mp4">
      </video>
      <div class="tile-scrim"></div>
      <div class="tile-body">
        <div class="tile-icon">${iconSvg(t.icon)}</div>
        <div class="tile-label">${t.label}</div>
        ${t.sub ? `<div class="tile-sub">${t.sub}</div>` : ''}
      </div>
    </a>
  `).join('');
}
render();
</script>
 
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<style>
  body { margin:0; font-family: Segoe UI, sans-serif; background:#fff; }
  .widget { background:#C8102E; color:#fff; padding:12px 16px; border-radius:6px 6px 0 0; max-width:400px; }
  .label { font-size:12px; opacity:0.85; }
  .price { font-size:22px; font-weight:600; margin:4px 0; }
  .change { font-size:13px; }
  .up { color:#9CFFB0; }
  .down { color:#FFB3B3; }
  #chart-container { max-width:400px; border:1px solid #eee; border-top:none; border-radius:0 0 6px 6px; }
</style>
</head>
<body>
  <div class="widget">
    <div class="label">PENERGY (5133.KL)</div>
    <div class="price" id="price">Loading...</div>
    <div class="change" id="change"></div>
  </div>
  <div id="chart-container"></div>

  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <script>
    fetch('./data.json')
      .then(res => res.json())
      .then(data => {
        const result = data.chart.result[0];
        const meta = result.meta;
        const timestamps = result.timestamp;
        const quote = result.indicators.quote[0];

        // Price box
        const price = meta.regularMarketPrice;
        const prevClose = meta.previousClose || meta.chartPreviousClose;
        const change = price - prevClose;
        const pct = (change / prevClose * 100).toFixed(2);
        document.getElementById('price').innerText = `RM ${price.toFixed(2)}`;
        const changeEl = document.getElementById('change');
        changeEl.innerText = `${change >= 0 ? '+' : ''}${change.toFixed(2)} (${pct}%)`;
        changeEl.className = 'change ' + (change >= 0 ? 'up' : 'down');

        // Build candle data
        const candles = timestamps.map((t, i) => ({
          time: t,
          open: quote.open[i],
          high: quote.high[i],
          low: quote.low[i],
          close: quote.close[i]
        })).filter(c => c.open !== null && c.close !== null);

        // Render chart
        const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
          width: 400,
          height: 220,
          layout: { background: { color: '#ffffff' }, textColor: '#333' },
          grid: { vertLines: { color: '#f0f0f0' }, horzLines: { color: '#f0f0f0' } },
          timeScale: { timeVisible: false, borderColor: '#ddd' },
          rightPriceScale: { borderColor: '#ddd' }
        });

        const candleSeries = chart.addCandlestickSeries({
          upColor: '#26a69a',
          downColor: '#ef5350',
          borderVisible: false,
          wickUpColor: '#26a69a',
          wickDownColor: '#ef5350'
        });

        candleSeries.setData(candles);
        chart.timeScale().fitContent();
      })
      .catch((err) => {
        document.getElementById('price').innerText = 'Unable to load';
        console.error(err);
      });
  </script>
</body>
</html>
